<!-- @ulu-demo
  title: Fixed Width Utilities
  description: |
    These utility classes enforce a strict `width` property on an element. Available sizes include `icon`, `small-x`, `small`, `medium`, and `large`.
-->
<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content width-icon" style="padding: 0.5rem;">
    <span class="fas fa-circle-info" aria-hidden="true"></span>
  </div>
</div>

<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content width-small-x">
    <p class="text-center no-margin">small-x</p>
  </div>
</div>

<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content width-small">
    <p class="text-center no-margin">small</p>
  </div>
</div>

<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content width-medium">
    <p class="text-center no-margin">medium</p>
  </div>
</div>

<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content width-large">
    <p class="text-center no-margin">large</p>
  </div>
</div>

<!-- @ulu-demo
  title: Max-Width Utilities
  description: |
    Use `.max-width-*` classes to constrain width responsively, allowing elements to shrink on smaller viewports. Often combined with `margin-auto` to center layout blocks.
-->
<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content max-width-small margin-auto">
    <p class="text-center no-margin">max-width-small (centered)</p>
  </div>
</div>

<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content max-width-medium margin-auto">
    <p class="text-center no-margin">max-width-medium (centered)</p>
  </div>
</div>

<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content max-width-large margin-auto">
    <p class="text-center no-margin">max-width-large (centered)</p>
  </div>
</div>

<!-- @ulu-demo
  title: Full Width
  description: |
    Force an element to span the entire width of its container using the `.full-width` utility class.
-->
<div class="demo-grid-container margin-bottom">
  <div class="demo-grid__content full-width">
    <p class="text-center no-margin">.full-width</p>
  </div>
</div>
