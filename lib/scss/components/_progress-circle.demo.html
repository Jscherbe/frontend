<!-- @ulu-demo
  title: Basic Donut Chart
  description: |
    A circular progress indicator using an SVG donut chart structure.
-->
<div class="progress-circle progress-circle--warning">
  <strong class="hidden-visually">Course Progress</strong>
  <div class="progress-circle__chart">
    <svg class="progress-circle__chart-svg" viewBox="0 0 32 32">
      <circle class="progress-circle__chart-track" r="16" cx="16" cy="16" />
      <circle class="progress-circle__chart-pie" r="16" cx="16" cy="16" style="stroke-dasharray: 65 100;" />
      <circle class="progress-circle__chart-mask" cx="16" cy="16" />
    </svg>
    <strong class="progress-circle__chart-value">65%</strong>
  </div>
</div>

<!-- @ulu-demo
  title: Status Colors
  description: |
    The progress chart colors can change dynamically based on status classes like `progress-circle--danger` (typically under 30%), `progress-circle--warning` (30% to 99%), and `progress-circle--success` (100%).
-->
<div style="display: flex; gap: 2rem; flex-wrap: wrap;">
  <div>
    <h4>Danger (25%)</h4>
    <div class="progress-circle progress-circle--danger">
      <div class="progress-circle__chart">
        <svg class="progress-circle__chart-svg" viewBox="0 0 32 32">
          <circle class="progress-circle__chart-track" r="16" cx="16" cy="16" />
          <circle class="progress-circle__chart-pie" r="16" cx="16" cy="16" style="stroke-dasharray: 25 100;" />
          <circle class="progress-circle__chart-mask" cx="16" cy="16" />
        </svg>
        <strong class="progress-circle__chart-value">25%</strong>
      </div>
    </div>
  </div>

  <div>
    <h4>Warning (75%)</h4>
    <div class="progress-circle progress-circle--warning">
      <div class="progress-circle__chart">
        <svg class="progress-circle__chart-svg" viewBox="0 0 32 32">
          <circle class="progress-circle__chart-track" r="16" cx="16" cy="16" />
          <circle class="progress-circle__chart-pie" r="16" cx="16" cy="16" style="stroke-dasharray: 75 100;" />
          <circle class="progress-circle__chart-mask" cx="16" cy="16" />
        </svg>
        <strong class="progress-circle__chart-value">75%</strong>
      </div>
    </div>
  </div>

  <div>
    <h4>Success (100%)</h4>
    <div class="progress-circle progress-circle--success">
      <div class="progress-circle__chart">
        <svg class="progress-circle__chart-svg" viewBox="0 0 32 32">
          <circle class="progress-circle__chart-track" r="16" cx="16" cy="16" />
          <circle class="progress-circle__chart-pie" r="16" cx="16" cy="16" style="stroke-dasharray: 101 100;" />
          <circle class="progress-circle__chart-mask" cx="16" cy="16" />
        </svg>
        <strong class="progress-circle__chart-value">100%</strong>
      </div>
    </div>
  </div>
</div>
