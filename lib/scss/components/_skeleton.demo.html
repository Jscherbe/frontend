<!-- @ulu-demo
  title: Skeleton Text
  description: |
    Placeholder lines for text content during loading.
-->
<div style="max-width: 400px;">
  <div class="skeleton skeleton--text skeleton--width-large"></div>
  <div class="skeleton skeleton--text"></div>
  <div class="skeleton skeleton--text"></div>
  <div class="skeleton skeleton--text skeleton--width-small"></div>
</div>

<!-- @ulu-demo
  title: Inline Text Blocks
  description: |
    Using `.skeleton--inline` and sizing helpers (like `.skeleton--width-small-x`, `.skeleton--width-large`) to construct inline text flows and paragraph shapes. Alternating background styling can be applied using `.skeleton--background-alt`.
-->
<div>
  <div>
    <span class="skeleton skeleton--text skeleton--inline skeleton--width-small-xx"></span>
    <span class="skeleton skeleton--text skeleton--inline skeleton--width-small-x"></span>
    <span class="skeleton skeleton--text skeleton--inline skeleton--width-small-xx"></span>
  </div>
  <div>
    <span class="skeleton skeleton--text skeleton--inline skeleton--background-alt skeleton--width-small-x"></span>
    <span class="skeleton skeleton--text skeleton--inline skeleton--width-small-x"></span>
  </div>
  <div>
    <span class="skeleton skeleton--text skeleton--inline skeleton--background-alt skeleton--width-large-x"></span>
  </div>
  <div>
    <span class="skeleton skeleton--text skeleton--inline skeleton--width-small-x"></span>
    <span class="skeleton skeleton--text skeleton--inline skeleton--background-alt skeleton--width-large"></span>
  </div>
</div>

<!-- @ulu-demo
  title: Skeleton Media
  description: |
    A placeholder for images or video assets.
-->
<div style="max-width: 300px;">
  <div class="skeleton skeleton--media">
    <span class="fas fa-image" aria-hidden="true"></span>
  </div>
</div>

<!-- @ulu-demo
  title: Composite Skeleton (Card)
  description: |
    Combining different skeleton elements to represent a complex UI component.
-->
<article class="card" style="max-width: 300px;">
  <div class="card__image">
    <div class="skeleton skeleton--block" style="aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;">
      <span class="fas fa-image type-large-xx" aria-hidden="true" style="color: rgba(0,0,0,0.15);"></span>
    </div>
  </div>
  <div class="card__body">
    <div class="card__title">
      <div class="skeleton skeleton--text skeleton--width-large"></div>
    </div>
    <div class="card__main">
      <div class="skeleton skeleton--text"></div>
      <div class="skeleton skeleton--text skeleton--width-small"></div>
    </div>
  </div>
</article>
