<!-- @ulu-demo
  title: Tagged Buttons (Sizing)
  description: |
    Position notification counter tags over small, default, or large buttons using the `.tagged` class.
-->
<div style="display: flex; gap: 1rem; align-items: center;">
  <button class="button button--small button--icon tagged">
    <span class="button__icon fas fa-bell" aria-hidden="true"></span>
    <span class="hidden-visually">Notifications</span>
    <span class="tagged__tag tag tag--danger tag--small tag--counter">3</span>
  </button>

  <button class="button button--icon tagged">
    <span class="button__icon fas fa-bell" aria-hidden="true"></span>
    <span class="hidden-visually">Notifications</span>
    <span class="tagged__tag tag tag--danger tag--small tag--counter">3</span>
  </button>

  <button class="button button--large button--icon tagged">
    <span class="button__icon fas fa-bell" aria-hidden="true"></span>
    <span class="hidden-visually">Notifications</span>
    <span class="tagged__tag tag tag--danger tag--counter">3</span>
  </button>
</div>

<!-- @ulu-demo
  title: Tagged Text Button
  description: |
    Positioning a tag over a standard text-based button.
-->
<button class="button tagged">
  <span>Messages</span>
  <span class="tagged__tag tag tag--danger tag--small tag--counter">12</span>
</button>

<!-- @ulu-demo
  title: extreme Value Tags
  description: |
    Display large notification numbers, showing how the tag expands to accommodate large values (like thousands) on icon and text buttons.
-->
<div style="display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;">
  <button class="button button--icon tagged">
    <span class="button__icon fas fa-bell" aria-hidden="true"></span>
    <span class="hidden-visually">Notifications</span>
    <span class="tagged__tag tag tag--danger tag--small tag--counter">3,000</span>
  </button>

  <button class="button tagged">
    <span>System Alerts</span>
    <span class="tagged__tag tag tag--danger tag--counter">30,000</span>
  </button>
</div>
